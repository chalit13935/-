<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety & 6S System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 200px; }
        .main-content { margin-left: 200px; padding: 20px; }
        .nav-link { color: #ecf0f1; cursor: pointer; border-bottom: 1px solid #34495e; }
        .nav-link:hover { background: #34495e; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
        /* เพิ่มเติม: สไตล์สำหรับรูปภาพในตาราง */
        .img-preview { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; }
        .img-preview:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3">
    <h5>กลุ่มตรวจ คปอ.</h5>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-link" onclick="setGroup(1)">👤 กลุ่มที่ 1</li>
        <li class="nav-link" onclick="setGroup(2)">👤 กลุ่มที่ 2</li>
        <li class="nav-link" onclick="setGroup(3)">👤 กลุ่มที่ 3</li>
        <li class="nav-link" onclick="setGroup(4)">👤 กลุ่มที่ 4</li>
        <li class="nav-link" onclick="setGroup(5)">👤 กลุ่มที่ 5</li>
    </ul>
    <hr>
    <button class="btn btn-warning btn-sm" onclick="showDeptMenu()">📦 เมนูสำหรับแผนก (แก้ไขงาน)</button>
</div>

<div class="main-content">
    <div id="setup-info" class="alert alert-info">กรุณาเลือก "กลุ่มตรวจ" ที่เมนูด้านซ้าย</div>
    
    <div id="inspect-form" style="display:none;">
        <h3 id="display-group">บันทึกข้อมูล</h3>
        <div class="card p-3 mb-3">
            <label>ประเภทการตรวจ:</label>
            <div class="btn-group mb-3">
                <input type="radio" class="btn-check" name="type" id="type1" value="6S" checked>
                <label class="btn btn-outline-primary" for="type1">6ส</label>
                <input type="radio" class="btn-check" name="type" id="type2" value="Safety">
                <label class="btn btn-outline-danger" for="type2">คปอ. (Safety)</label>
            </div>

            <label>แผนกที่เข้าตรวจ:</label>
            <select class="form-select mb-3" id="dept">
                <option value="Store">สโตร์</option>
                <option value="Prod_A">ไลน์ผลิต A</option>
                <option value="QC">ห้องแล็บ QC</option>
            </select>

            <label>ถ่ายรูป/ระบุปัญหา:</label>
            <input type="file" id="photo" class="form-control mb-2" accept="image/*" capture="environment">
            <textarea id="comment" class="form-control mb-3" placeholder="ระบุสิ่งที่พบและความเสี่ยง..."></textarea>
            
            <button id="btnSubmit" class="btn btn-success w-100" onclick="submitData()">ส่งข้อมูลเข้าแผนก</button>
        </div>

        <div class="mt-5">
            <h4 class="text-primary"><i class="bi bi-display"></i> รายการที่พบของกลุ่มนี้ (สำหรับพรีเซนต์)</h4>
            <div class="table-responsive mt-3">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 15%;">แผนก</th>
                            <th style="width: 10%;">ประเภท</th>
                            <th>รายละเอียดปัญหา</th>
                            <th style="width: 15%;">รูปภาพ</th>
                        </tr>
                    </thead>
                    <tbody id="presentation-table">
                        <tr><td colspan="4" class="text-center text-muted">กำลังโหลดข้อมูลการตรวจ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">รูปภาพจุดที่พบปัญหา</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center bg-light">
                <img id="fullImage" src="" class="img-fluid rounded shadow">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- ตั้งค่าส่วนตัวตรงนี้ ---
    var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxduUKHQKcni0XeW13z9ONEqWQws9IFlgB06YgF8iPkJuJC0d4HK1wTbywYTAGqyZN/exec"; 
    var currentGroup = 0;

    function setGroup(id) {
        currentGroup = id;
        document.getElementById('setup-info').style.display = 'none';
        document.getElementById('inspect-form').style.display = 'block';
        document.getElementById('display-group').innerText = 'กลุ่มตรวจที่ ' + id + ' กำลังบันทึกข้อมูล';
        
        // เพิ่มเติม: เมื่อเปลี่ยนกลุ่ม ให้ดึงข้อมูลมาโชว์ในตารางพรีเซนต์ทันที
        loadPresentationData(id);
    }
    
    function showDeptMenu() {
        alert('ระบบกำลังดึงข้อมูลงานค้างแก้จาก Google Sheets...');
    }

    function submitData() {
        var type = document.querySelector('input[name="type"]:checked').value;
        var dept = document.getElementById('dept').value;
        var comment = document.getElementById('comment').value;
        var fileInput = document.getElementById('photo');
        var btn = document.getElementById('btnSubmit');

        if (!comment) { alert("กรุณาระบุรายละเอียดปัญหา"); return; }
        
        btn.disabled = true;
        btn.innerText = "กำลังส่งข้อมูล... กรุณารอสักครู่";

        if (fileInput.files.length > 0) {
            var file = fileInput.files[0];
            var reader = new FileReader();
            reader.onloadend = function() {
                var base64Data = reader.result;
                sendToGoogle({
                    group_no: currentGroup,
                    type: type,
                    department: dept,
                    comment: comment,
                    image_data: base64Data
                });
            };
            reader.readAsDataURL(file);
        } else {
            sendToGoogle({
                group_no: currentGroup,
                type: type,
                department: dept,
                comment: comment,
                image_data: null
            });
        }
    }

    function sendToGoogle(formData) {
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(data => {
            alert("บันทึกข้อมูลสำเร็จ!");
            location.reload(); 
        })
        .catch(err => {
            alert("เกิดข้อผิดพลาด: " + err);
            document.getElementById('btnSubmit').disabled = false;
        });
    }

    // --- ส่วนที่เพิ่มใหม่: ฟังก์ชันดึงข้อมูลมาแสดงในตาราง ---
    function loadPresentationData(groupId) {
        const tableBody = document.getElementById('presentation-table');
        tableBody.innerHTML = '<tr><td colspan="4" class="text-center">กำลังดึงข้อมูล...</td></tr>';

        // ดึงข้อมูลผ่านคำสั่ง GET โดยส่งพารามิเตอร์ action=read และ group
        fetch(SCRIPT_URL + "?action=read&group=" + groupId)
        .then(res => res.json())
        .then(data => {
            tableBody.innerHTML = '';
            if (!data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">ไม่พบประวัติการตรวจของกลุ่มนี้</td></tr>';
                return;
            }
            
            data.forEach(item => {
                let badgeClass = (item.type === 'Safety') ? 'bg-danger' : 'bg-primary';
                let photoHtml = item.photo !== "ไม่มีรูป" 
                    ? `<img src="${item.photo}" class="img-preview" onclick="openFullImage('${item.photo}')">` 
                    : '<span class="text-muted">ไม่มีรูป</span>';

                tableBody.innerHTML += `
                    <tr>
                        <td><b>${item.department}</b></td>
                        <td><span class="badge ${badgeClass}">${item.type}</span></td>
                        <td>${item.comment}</td>
                        <td class="text-center">${photoHtml}</td>
                    </tr>
                `;
            });
        })
        .catch(err => {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">ไม่สามารถโหลดข้อมูลได้ หรือยังไม่ได้ตั้งค่า doGet ใน Apps Script</td></tr>';
        });
    }

    function openFullImage(url) {
        document.getElementById('fullImage').src = url;
        var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
        myModal.show();
    }

    
function loadGroupData(groupId) {
    const tableBody = document.getElementById('display-table');
    tableBody.innerHTML = '<tr><td colspan="4" class="text-center">กำลังโหลดข้อมูล...</td></tr>';

    // เราจะใช้ SCRIPT_URL เดิมที่มีอยู่แล้ว แต่ส่งคำสั่ง GET ไปแทน
    fetch(SCRIPT_URL + "?action=read&group=" + groupId)
    .then(res => res.json())
    .then(data => {
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" class="text-center">ยังไม่มีบันทึกสำหรับกลุ่มนี้</td></tr>';
            return;
        }
        data.forEach(row => {
            tableBody.innerHTML += `
                <tr>
                    <td><b>${row.department}</b></td>
                    <td><span class="badge ${row.type === 'Safety' ? 'bg-danger' : 'bg-primary'}">${row.type}</span></td>
                    <td>${row.comment}</td>
                    <td>
                        <img src="${row.photo}" style="height: 50px; cursor: pointer;" 
                             onclick="viewImage('${row.photo}')" class="rounded border">
                    </td>
                </tr>
            `;
        });
    });
}

function viewImage(url) {
    document.getElementById('modalImg').src = url;
    new bootstrap.Modal(document.getElementById('imageModal')).show();
}
</script>

</body>
</html>
